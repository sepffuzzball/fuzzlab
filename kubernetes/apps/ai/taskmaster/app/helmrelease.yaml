---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app taskmaster
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      taskmaster:
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: &secret taskmaster-secrets
        replicas: 1
        containers:
          app:
            image:
              repository: ghcr.io/sepffuzzball/taskmaster
              tag: sha-1ade168
            env:
              NODE_ENV: production
              HOST: 0.0.0.0
              PORT: 3000
              DB_DIALECT: postgres
              APP_ORIGIN: https://taskmaster.${SECRET_DOMAIN}
              OIDC_ISSUER: https://auth.${SECRET_DOMAIN}/application/o/taskmaster/
              OIDC_REDIRECT_URI: https://taskmaster.${SECRET_DOMAIN}/api/v1/auth/callback
            envFrom:
              - secretRef:
                  name: *secret
              - secretRef:
                  name: ${APP}-db-secret
            probes:
              liveness:
                custom: true
                enabled: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: http
                    scheme: HTTP
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                custom: true
                enabled: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: http
                    scheme: HTTP
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
    service:
      app:
        ports:
          http:
            port: &port 3000
    route:
      app:
        enabled: true
        hostnames:
          - "taskmaster.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
