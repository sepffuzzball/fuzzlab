---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: model-hotel-db
  namespace: ai
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-pgo-secrets
  target:
    name: model-hotel-db-secret
    template:
      engineVersion: v2
      data:
        DATABASE_URL: '{{ index . "pgbouncer-uri" }}'

  dataFrom:
    - extract:
        key: postgres-pguser-model-hotel
