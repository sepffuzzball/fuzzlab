---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app opencode
  namespace: ai
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template

  values:
    fullnameOverride: opencode-server
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          copy-config:
            image:
              repository: busybox
              tag: 1.37
            securityContext:
              runAsUser: 0
            command:
              - sh
              - -c
              - cp /config/opencode.jsonc /home/opencode/.config/opencode/opencode.jsonc
        containers:
          app:
            image:
              repository: ghcr.io/anomalyco/opencode
              tag: 1.3.17@sha256:1aadad5baee0e4f428793b876a0c50dee670b4bd7dd6e481d31094df56fbb02c
            env:
              TZ: ${TIMEZONE}
              HOME: /home/opencode
            envFrom:
              - secretRef:
                  name: opencode-secret
            command:
              - opencode
              - web
              - --hostname
              - "0.0.0.0"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: &probe
                    path: /
                    port: &port 4096
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: *probe
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 2Gi

    service:
      app:
        controller: app
        ports:
          http:
            port: *port

    # route:
    #   app:
    #     hostnames:
    #       - "opencode.${SECRET_DOMAIN}"
    #     parentRefs:
    #       - name: external
    #         namespace: kube-system
    #         sectionName: https
    #     rules:
    #       - backendRefs:
    #           - identifier: app
    #             port: *port

    persistence:
      config:
        existingClaim: opencode-config
        globalMounts:
          - path: /home/opencode/.config/opencode
      data:
        existingClaim: opencode-data
        globalMounts:
          - path: /projects
      config-file:
        type: configMap
        name: opencode-config
        globalMounts:
          - path: /config
