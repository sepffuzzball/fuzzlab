---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ${APP}-db
  namespace: web
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: crunchy-pgo-secrets
  target:
    name: ${DB_USER}-db-secret
    template:
      engineVersion: v2
      data:
        DATABASE_URL: '{{ index . "pgbouncer-uri" }}'

  dataFrom:
    - extract:
        key: postgres-pguser-${DB_USER}
