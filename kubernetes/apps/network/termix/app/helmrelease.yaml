---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app termix
  namespace: network
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: csi-driver-cephfs
      namespace: storage
  values:
    controllers:
      abs:
        containers:
          main:
            image:
              repository: ghcr.io/lukegus/termix
              tag: release-2.1.0
            env:
              TZ: ${TIMEZONE}
              PORT: &port 8080
              ENABLE_GUACAMOLE: true
              GUACD_HOST: termix-guacd.network.svc.cluster.local
              GUACD_PORT: "4822"
            envFrom:
              - secretRef:
                  name: termix-secrets
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: abs
        ports:
          http:
            port: *port
    route:
      abs:
        enabled: true
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https

    persistence:
      data:
        enabled: true
        existingClaim: termix-config
        globalMounts:
          - path: /app/data
