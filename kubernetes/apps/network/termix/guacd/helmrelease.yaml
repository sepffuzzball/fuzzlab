---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app termix-guacd
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: csi-driver-cephfs
      namespace: storage

  values:
    controllers:
      abs:
        containers:
          main:
            image:
              repository: docker.io/guacamole/guacd
              tag: 1.6.0@sha256:8974eaa9ba32f713daf311e7cc8cd7e4cdfba1edea39eed75524e78ef4b08f4f
            env:
              TZ: ${TIMEZONE}
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1100
        runAsGroup: 1100
        fsGroup: 1100
        fsGroupChangePolicy: OnRootMismatch
    service:
      main:
        controller: abs
        ports:
          http:
            port: &port 4822
    # route:
    #   abs:
    #     enabled: true
    #     hostnames:
    #       - "{{ .Release.Name }}.${SECRET_DOMAIN}"
    #     parentRefs:
    #       - name: external
    #         namespace: kube-system
    #         sectionName: https
    #     rules:
    #       - backendRefs:
    #           - identifier: main
    #             port: *port
    #         filters:
    #           - type: RequestHeaderModifier
    #             requestHeaderModifier:
    #               # Set (overwrite) the X-Forwarded-Proto header
    #               set:
    #                 - name: X-Forwarded-Proto
    #                   value: https

    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          abs:
            app:
              - path: /home/guacd
                subPath: guacd
      # data:
      #   enabled: true
      #   existingClaim: termix-guacd-config
      #   globalMounts:
      #     - path: /data
