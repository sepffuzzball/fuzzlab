---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tg-vid-converter
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      tg-vid-converter:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              repository: ghcr.io/sepffuzzball/tg-vid-converter
              tag: sha-2221ea3
            envFrom:
              - secretRef:
                  name: ${APP}-secrets
            resources:
              requests:
                cpu: 100m
                memory: 256Mi

    service:
      main:
        controller: tg-vid-converter
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        loadBalancerIP: ${TG_VID_CONVERTER_ADDR}
        ports:
          http:
            port: &port 8080
