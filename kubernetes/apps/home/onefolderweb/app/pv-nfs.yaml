---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: onefolderweb-data-pv
spec:
  capacity:
    storage: 1Mi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-sc
  mountOptions:
    - nfsvers=4.1
    - nconnect=8
    - hard
  volumeMode: Filesystem
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: onefolderwebdata
    volumeAttributes:
      server: 10.0.2.20
      share: /mnt/lcl/private/sepfy/onefolderweb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: onefolderweb-data
  namespace: cloud
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Mi
  storageClassName: nfs-sc
  volumeName: onefolderweb-data-pv
