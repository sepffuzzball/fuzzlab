# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onefolderweb
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      onefolderweb:
        pod:
          # --- Added Security Context ---
          securityContext:
            runAsUser: 3333
            runAsGroup: 3333
            #fsGroup: 3333
            #fsGroupChangePolicy: "OnRootMismatch"
          # ------------------------------
          automountServiceAccountToken: false
          enableServiceLinks: false
        containers:
          main:
            image:
              repository: ghcr.io/sepffuzzball/onefolderweb
              tag: 0.1.6
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
            env:
              READ_ONLY: false
              DEFAULT_READ_ONLY_VIEW: masonry-vertical
              HIDE_EMPTY_FOLDERS: false
              MAX_UPLOAD_MB: 1024
              BACKUP_INTERVAL_HOURS: 24
              BACKUP_RETENTION_DAYS: 90
              SCAN_INTERVAL_MS: 60000
              TRASH_DIR: /data/trash
              SITE_NAME: Sepfy's art stash
              HOST: 0.0.0.0
              PORT: &port 4317

    service:
      main:
        controller: onefolderweb
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        loadBalancerIP: ${ONEFOLDERWEB_ADDR}
        ports:
          http:
            port: *port
    persistence:
      data:
        enabled: true
        existingClaim: onefolderweb-data
        globalMounts:
          - path: /data
