---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ha-ocr-schedulerr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ha-ocr-schedulerr:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              repository: ghcr.io/sepffuzzball/ha-ocr-schedulerr
              tag: sha-da7b66d
            env:
              TZ: ${TZ}
              AI_PARSER_ENABLED: true
              AI_TIMEOUT: 90
            envFrom:
              - secretRef:
                  name: ${APP}-secrets
            resources:
              requests:
                cpu: 100m
                memory: 128Mi

    service:
      main:
        controller: ha-ocr-schedulerr
        ports:
          http:
            port: &port 80
