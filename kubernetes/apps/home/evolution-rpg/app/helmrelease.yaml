---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: evolution-rpg
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      evolution-rpg:
        annotations:
          reloader.stakater.com/auto: "true"

        containers:
          main:
            image:
              repository: ghcr.io/sepffuzzball/evolution-rpg
              tag: sha-d302101
            env:
              APP_ENV: production
              APP_STATE_KEY: main
              PORT: &port 80
              DATABASE_DRIVER: postgres
            envFrom:
              - secretRef:
                  name: ${APP}-secrets
              - secretRef:
                  name: ${APP}-db-secret
            resources:
              requests:
                cpu: 100m
                memory: 128Mi

    service:
      main:
        controller: evolution-rpg
        ports:
          http:
            port: *port
