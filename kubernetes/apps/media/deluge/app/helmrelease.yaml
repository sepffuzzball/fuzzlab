---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: deluge
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: csi-driver-cephfs
      namespace: storage
    - name: csi-driver-smb
      namespace: storage
  values:
    controllers:
      deluge:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: binhex/arch-delugevpn
              tag: 2.2
            env:
              DEBUG: true
              DELUGE_DAEMON_LOG_LEVEL: info
              DELUGE_WEB_LOG_LEVEL: info
              ENABLE_PRIVOXY: no
              ENABLE_SOCKS: no
              LAN_NETWORK: 10.33.0.0/16,10.0.0.0/16
              NAME_SERVERS: 10.0.1.1,1.1.1.1,9.9.9.9
              PGID: ${PGID}
              PUID: ${PUID}
              STRICT_PORT_FORWARD: yes
              TZ: ${TIMEZONE}
              UMASK: 002
              VPN_CLIENT: openvpn
              VPN_ENABLED: yes
              VPN_PROV: protonvpn
              DELUGE_ENABLE_WEBUI_PASSWORD: no
            envFrom:
              - secretRef:
                  name: deluge-secrets
            securityContext:
              capabilities:
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 1100
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: deluge
        ports:
          http:
            port: &port 8112
          privoxy:
            enabled: true
            port: 8118
            protocol: TCP
          microsocks:
            enabled: false
            port: 9118
            protocol: TCP
          vpn1:
            enabled: true
            port: 58846
            protocol: TCP
          vpn2:
            enabled: true
            port: 58946
            protocol: TCP
          vpn3:
            enabled: true
            port: 58946
            protocol: UDP
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        loadBalancerIP: ${DELUGE_ADDR}

    persistence:
      config:
        existingClaim: deluge-config
        globalMounts:
          - path: /config
      tmp:
        type: emptyDir

      lcl:
        existingClaim: lcl

      downloads:
        existingClaim: lcl-downloads
        globalMounts:
          - path: /downloads

      dev-tun:
        type: hostPath
        hostPath: /dev/net/tun
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/net/tun