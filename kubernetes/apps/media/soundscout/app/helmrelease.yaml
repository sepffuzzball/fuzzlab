---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app soundscout
  namespace: ${NS}
  labels:
    app.kubernetes.io/name: *app
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      soundscout:
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          #nodeSelector:
          #intel.feature.node.kubernetes.io/gpu: "true"
          #nvidia.com/gpu.present: "true"
          securityContext:
            runAsUser: ${PUID}
            runAsGroup: ${PGID}
            fsGroup: ${PGID}
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/ashyy0205/soundscout
              tag: main
            env:
              DISCOVERY_ACQUIRE: 1
              TZ: ${TIMEZONE}
              PLEX_BASEURL: http://${PLEX_ADDR}:32400
              PLEX_MUSIC_LIBRARY: Music
              WEBUI_PUBLIC_URL: http://${SOUNDSCOUT_ADDR}:5000
            envFrom:
              - secretRef:
                  name: soundscout-secrets
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 2000m
                memory: 256Mi
              limits:
                cpu: 8000m
                memory: 8Gi
    service:
      app:
        controller: soundscout
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        loadBalancerIP: ${SOUNDSCOUT_ADDR}
        ports:
          http:
            port: &port 5000

    # ingress:
    #   app:
    #     enabled: true
    #     className: &class "pangolin"
    #     annotations:
    #       kubernetes.io/ingress.allow-http: "true"
    #       kubernetes.io/ingress.class: *class
    #       nginx.ingress.kubernetes.io/ssl-redirect: "false"
    #       nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    #     hosts:
    #       - host: &host "soundscout.${SECRET_DOMAIN_FBE}"
    #         paths:
    #           - path: /
    #             service:
    #               identifier: app
    #               port: *port
    # tls:
    #   - hosts:
    #       - *host

    persistence:
      config:
        existingClaim: soundscout-config
        advancedMounts:
          soundscout:
            app:
              - path: /config
      data:
        existingClaim: soundscout-data
        advancedMounts:
          soundscout:
            app:
              - path: /app/data

      scraper:
        existingClaim: soundscout-scraper
        advancedMounts:
          soundscout:
            app:
              - path: /root/.scraper

      music:
        existingClaim: lcl-music
        advancedMounts:
          soundscout:
            app:
              - path: /music