---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app watcharr
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: csi-driver-cephfs
      namespace: storage
    - name: csi-driver-smb
      namespace: storage
  values:
    controllers:
      abs:
        containers:
          main:
            image:
              repository: ghcr.io/sbondco/watcharr
              tag: v3.0.1
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2048Mi
    service:
      main:
        controller: abs
        ports:
          http:
            port: &port 3080
    route:
      abs:
        enabled: true
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  # Set (overwrite) the X-Forwarded-Proto header
                  set:
                    - name: X-Forwarded-Proto
                      value: https

    persistence:
      data:
        enabled: true
        existingClaim: watcharr-config
        globalMounts:
          - path: /data
