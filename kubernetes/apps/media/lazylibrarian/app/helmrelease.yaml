---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lazylibrarian
  namespace: media
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: csi-driver-cephfs
      namespace: storage
    - name: csi-driver-smb
      namespace: storage
  values:
    controllers:
      abs:
        containers:
          main:
            image:
              repository: linuxserver/lazylibrarian
              tag: version-5bb59dd1
            env:
              TZ: ${TIMEZONE}
              PUID: ${PUID}
              PGID: ${PGID}
              DOCKER_MODS: linuxserver/mods:universal-calibre|linuxserver/mods:lazylibrarian-ffmpeg
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 4096Mi
    service:
      main:
        controller: abs
        ports:
          http:
            port: &port 5299
    route:
      abs:
        enabled: true
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: main
                port: *port
            filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  # Set (overwrite) the X-Forwarded-Proto header
                  set:
                    - name: X-Forwarded-Proto
                      value: https

    persistence:
      config:
        enabled: true
        existingClaim: lazylibrarian-config
        globalMounts:
          - path: /config

      lcl:
        enabled: true
        existingClaim: lcl
        globalMounts:
          - path: /media
      downloads:
        enabled: true
        existingClaim: lcl-downloads
        globalMounts:
          - path: /downloads
