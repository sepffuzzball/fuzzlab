---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app alac-to-flac
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: csi-driver-cephfs
      namespace: storage
    - name: csi-driver-smb
      namespace: storage
  values:
    controllers:
      alc:
        #pod:
        #  securityContext:
        #    runAsUser: ${PUID}
        #    runAsGroup: ${PGID}
        #    runAsNonRoot: false
        #    fsGroup: ${PGID}
        #    fsGroupChangePolicy: OnRootMismatch

        containers:
          main:
            image:
              repository: ghcr.io/sepffuzzball/alac-to-flac-docker
              tag: 0.1.3
            env:
              TZ: ${TIMEZONE}
              PUID: ${PUID}
              PGID: ${PGID}
              path: /media/music/2WEI
              subfolder: true
            resources:
              requests:
                cpu: 18m
                memory: 128Mi
              limits:
                memory: 4096Mi
    service:
      main:
        controller: alc
        ports:
          http:
            port: 80

    persistence:
      tmp:
        type: emptyDir
      lcl:
        enabled: true
        existingClaim: lcl
        globalMounts:
          - path: /lcl
      music:
        enabled: true
        existingClaim: lcl-music
        globalMounts:
          - path: /media/music
